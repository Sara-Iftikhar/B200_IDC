site_name: Infectious Disease Concepts
site_description: 10-day intensive course on epidemiology, genomics, and outbreak analysis
site_author: King Abdullah University of Science and Technology (KAUST)

copyright: "&copy; 2026 King Abdullah University of Science and Technology (KAUST). Designed by Sara Iftikhar."

theme:
  name: material
  custom_dir: overrides
  logo: assets/logo_new.jpeg
  favicon: assets/logo_new.jpeg
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Roboto
    code: Roboto Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link

nav:
  - Home: index.md
  - Course Info: course_info.md
  - Schedule: schedule.md
  - Prerequisites: prerequisites.md
  - Practicals:
      - 1. Introduction to R: week1/day01.md
      - 2. Introduction to Linux and HPC: week1/day02.md
      - 3. Artemis: week1/day03.md
      - 4. Genome Assembly and Variant Calling: week1/day04.md
      - 5. Phylogeny: week1/day05.md
      - 6. Outbreak: week2/day06.md
      - 7. BEAST: week2/day07.md
      - 8. Plasmidome analysis: week2/day08.md
  - Resources: resources.md

markdown_extensions:
  - admonition
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra_css:
  - stylesheets/extra.css
